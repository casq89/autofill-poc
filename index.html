<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Registro</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { padding: 8px; width: 300px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h2>Formulario de Contacto</h2>

    <form action="#" method="POST">
    <div class="form-group">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="fname" autocomplete="given-name" placeholder="Tu nombre" required>
    </div>

    <div class="form-group">
        <label for="apellido">Apellido:</label>
        <input type="text" id="apellido" name="lname" autocomplete="family-name" placeholder="Tu apellido" required>
    </div>

    <div class="form-group">
        <label for="correo">Correo electrónico:</label>
        <input type="email" id="correo" name="email" autocomplete="email" placeholder="ejemplo@correo.com" required>
    </div>

    <div class="form-group">
        <label for="telefono">Teléfono:</label>
        <input type="tel" id="telefono" name="tel" autocomplete="tel" placeholder="Ej: +34 600 000 000">
    </div>

    <div class="form-group">
        <label for="cp">Código Postal:</label>
        <input type="text" id="cp" name="zip" autocomplete="postal-code" pattern="[0-9]{5}" placeholder="Ej: 28001">
    </div>

    <button type="submit">Enviar datos</button>
</form>

</body>
</html>
